<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毎日のルーティン</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e222d;
    --border: #2a2f3d;
    --accent-gold: #c9a84c;
    --accent-gold-dim: rgba(201,168,76,0.15);
    --accent-red: #e05252;
    --accent-red-dim: rgba(224,82,82,0.12);
    --accent-green: #52b788;
    --accent-blue: #5b9bd5;
    --accent-teal: #4ecdc4;
    --text: #e8e4da;
    --text-dim: #7a7f8e;
    --text-muted: #4a4f5e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .app {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 16px 80px;
  }

  .header {
    padding: 28px 0 18px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }

  .header-left h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .header-left .subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    margin-top: 3px;
  }

  .date-main {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-align: right;
  }

  .nav {
    display: flex;
    gap: 4px;
    margin-bottom: 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }

  .nav-btn {
    flex: 1;
    padding: 8px 6px;
    background: transparent;
    border: none;
    border-radius: 7px;
    color: var(--text-dim);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .nav-btn.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 1px 8px rgba(0,0,0,0.4);
  }

  .view { display: none; }
  .view.active { display: block; }

  /* Savings card */
  .savings-card {
    background: linear-gradient(135deg, var(--surface2) 0%, #1a1d27 100%);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 20px 16px;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
  }

  .savings-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .savings-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .savings-amount {
    font-family: 'Noto Serif JP', serif;
    font-size: 38px;
    color: var(--accent-gold);
    line-height: 1;
  }

  .savings-amount span { font-size: 16px; margin-left: 3px; opacity: 0.8; }

  .savings-sub { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
  .savings-sub strong { color: var(--accent-gold); }
  .savings-today { font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .savings-today strong { color: var(--accent-teal); }

  .streak-badge {
    position: absolute;
    top: 20px; right: 20px;
    background: var(--accent-gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    padding: 7px 12px;
    text-align: center;
  }

  .streak-num {
    font-family: 'Noto Serif JP', serif;
    font-size: 24px;
    color: var(--accent-gold);
    line-height: 1;
  }

  .streak-label { font-size: 8px; color: var(--accent-gold); opacity: 0.7; letter-spacing: 0.1em; }

  .section-title {
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin: 20px 0 10px;
  }

  /* Weight */
  .weight-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 15px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .weight-icon { font-size: 22px; }

  .weight-info { flex: 1; }

  .weight-name { font-size: 14px; font-weight: 700; color: var(--text); }

  .weight-prev { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  .weight-input-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 5px 10px;
    transition: border-color 0.2s;
  }

  .weight-input-wrap:focus-within { border-color: var(--accent-teal); }

  .weight-input {
    width: 65px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--accent-teal);
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    text-align: right;
  }

  .weight-unit { font-size: 12px; color: var(--text-dim); }

  .weight-diff { font-size: 11px; font-weight: 700; min-width: 36px; text-align: center; }
  .weight-diff.up { color: var(--accent-red); }
  .weight-diff.down { color: var(--accent-green); }
  .weight-diff.same { color: var(--text-muted); }

  /* Main routine */
  .main-routine {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 14px;
    transition: border-color 0.3s;
    cursor: pointer;
    user-select: none;
  }

  .main-routine.done {
    border-color: rgba(201,168,76,0.4);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(201,168,76,0.04) 100%);
  }

  .main-routine-inner {
    display: flex;
    align-items: center;
    padding: 17px 18px;
    gap: 14px;
  }

  .toggle-btn {
    width: 50px; height: 26px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 13px;
    position: relative;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .toggle-btn::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    background: var(--text-muted);
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: all 0.3s;
  }

  .done .toggle-btn { background: rgba(201,168,76,0.2); border-color: var(--accent-gold); }
  .done .toggle-btn::after { background: var(--accent-gold); transform: translateX(22px); }

  .routine-icon { font-size: 22px; width: 34px; text-align: center; }
  .routine-info { flex: 1; }
  .routine-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .routine-desc { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .routine-reward { font-family: 'Noto Serif JP', serif; font-size: 15px; color: var(--accent-gold); font-weight: 700; }

  /* Sub routines */
  .sub-routines {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }

  .sub-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 13px;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    position: relative;
  }

  .sub-card:hover { border-color: var(--accent-blue); }

  .sub-card.done {
    border-color: rgba(82,183,136,0.5);
    background: rgba(82,183,136,0.05);
  }

  .sub-card.done .sub-name { color: var(--accent-green); }

  .sub-icon { font-size: 20px; }
  .sub-info { flex: 1; min-width: 0; }
  .sub-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .sub-streak { font-size: 9px; color: var(--text-muted); margin-top: 1px; }
  .sub-reward { font-size: 11px; color: var(--accent-green); font-weight: 700; flex-shrink: 0; }

  .check-mark {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 11px;
    color: var(--accent-green);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .sub-card.done .check-mark { opacity: 1; }

  /* Today total */
  .today-total {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .tt-label { font-size: 12px; color: var(--text-dim); letter-spacing: 0.06em; }

  .tt-val { font-family: 'Noto Serif JP', serif; font-size: 20px; color: var(--accent-teal); }

  .complete-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, rgba(201,168,76,0.15) 0%, rgba(201,168,76,0.08) 100%);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 12px;
    color: var(--accent-gold);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .complete-btn:hover { background: linear-gradient(135deg, rgba(201,168,76,0.25) 0%, rgba(201,168,76,0.15) 100%); transform: translateY(-1px); }

  .backup-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    margin-bottom: 10px;
  }

  .backup-btn {
    flex: 1;
    padding: 11px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .backup-btn:hover { border-color: var(--accent-teal); color: var(--accent-teal); }

  .import-label { cursor: pointer; }

  /* Stats */
  .period-toggle { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }

  .period-btn {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .period-btn.active { background: var(--accent-gold-dim); border-color: rgba(201,168,76,0.4); color: var(--accent-gold); }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }

  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px; }

  .stat-label { font-size: 9px; letter-spacing: 0.12em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }

  .stat-val { font-family: 'Noto Serif JP', serif; font-size: 19px; color: var(--text); line-height: 1; }

  .stat-card.gold .stat-val { color: var(--accent-gold); }
  .stat-card.green .stat-val { color: var(--accent-green); }
  .stat-card.teal .stat-val { color: var(--accent-teal); }

  .stat-unit { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; }

  .chart-title { font-size: 10px; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }

  .bar-chart { display: flex; align-items: flex-end; gap: 5px; height: 90px; }

  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--accent-gold-dim); border: 1px solid rgba(201,168,76,0.2); transition: height 0.5s ease; min-height: 2px; }
  .bar.low { background: var(--accent-red-dim); border-color: rgba(224,82,82,0.2); }

  .bar-label { font-size: 9px; color: var(--text-muted); }

  .weight-chart-wrap { height: 100px; }

  .weight-line-svg { width: 100%; height: 100%; overflow: visible; }

  .routine-stats { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }

  .routine-stat-row { display: flex; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); gap: 10px; }
  .routine-stat-row:last-child { border-bottom: none; }

  .rs-icon { font-size: 16px; width: 22px; text-align: center; }
  .rs-name { flex: 1; font-size: 12px; color: var(--text); }
  .rs-earn { font-size: 11px; color: var(--accent-gold); min-width: 48px; text-align: right; font-weight: 700; }
  .rs-count { font-family: 'Noto Serif JP', serif; font-size: 15px; color: var(--accent-green); min-width: 32px; text-align: right; }
  .rs-bar-wrap { width: 65px; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .rs-bar { height: 100%; background: var(--accent-green); border-radius: 3px; opacity: 0.6; }

  /* History */
  .month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }

  .month-nav button {
    background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
    width: 30px; height: 30px; color: var(--text-dim); font-size: 16px; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }

  .month-nav button:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

  .month-label { font-family: 'Noto Serif JP', serif; font-size: 17px; color: var(--text); flex: 1; text-align: center; }

  .history-list { display: flex; flex-direction: column; gap: 6px; }

  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 11px 13px; display: flex; align-items: center; gap: 8px; }

  .history-date { font-size: 11px; color: var(--text-dim); width: 62px; flex-shrink: 0; }

  .history-icons { display: flex; gap: 2px; flex: 1; flex-wrap: wrap; align-items: center; }

  .h-icon { font-size: 13px; opacity: 0.2; }
  .h-icon.done { opacity: 1; }

  .history-weight { font-size: 11px; color: var(--accent-teal); flex-shrink: 0; }
  .history-gain { font-family: 'Noto Serif JP', serif; font-size: 13px; color: var(--accent-gold); flex-shrink: 0; }

  .dot-drink { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-red); opacity: 0.5; }
  .dot-no-drink { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-gold); }

  .toast {
    position: fixed; bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--accent-gold);
    border-radius: 10px; padding: 10px 18px; font-size: 13px;
    color: var(--accent-gold); letter-spacing: 0.06em;
    transition: transform 0.3s ease; z-index: 1000; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes pulse-gold {
    0% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
    70% { box-shadow: 0 0 0 10px rgba(201,168,76,0); }
    100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
  }
  .pulse { animation: pulse-gold 0.6s ease; }

  @keyframes countUp { from { transform: scale(1.12); } to { transform: scale(1); } }
  .count-anim { animation: countUp 0.35s ease; }

  .empty-state { text-align: center; padding: 36px 20px; color: var(--text-muted); font-size: 13px; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <h1>毎日のルーティン</h1>
      <div class="subtitle">DAILY ROUTINE TRACKER</div>
    </div>
    <div class="date-main" id="todayDisplay"></div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="switchView('today', this)">今日</button>
    <button class="nav-btn" onclick="switchView('stats', this)">統計</button>
    <button class="nav-btn" onclick="switchView('history', this)">履歴</button>
  </div>

  <!-- TODAY -->
  <div class="view active" id="view-today">

    <div class="savings-card">
      <div class="savings-label">節約累計貯金</div>
      <div class="savings-amount" id="totalSavings">¥0<span>円</span></div>
      <div class="savings-sub">今月: <strong id="monthSavings">¥0</strong> ／ 今週: <strong id="weekSavings">¥0</strong></div>
      <div class="savings-today">今日の獲得: <strong id="todayGain">¥0</strong></div>
      <div class="streak-badge">
        <div class="streak-num" id="streakCount">0</div>
        <div class="streak-label">日連続禁酒</div>
      </div>
    </div>

    <div class="section-title">体重測定</div>

    <div class="weight-card">
      <div class="weight-icon">⚖️</div>
      <div class="weight-info">
        <div class="weight-name">体重</div>
        <div class="weight-prev" id="weightPrev">前回: —</div>
      </div>
      <div class="weight-input-wrap">
        <input class="weight-input" id="weightInput" type="number" step="0.1" min="20" max="300" placeholder="—" oninput="onWeightInput()">
        <div class="weight-unit">kg</div>
      </div>
      <div class="weight-diff same" id="weightDiff">—</div>
    </div>

    <div class="section-title">メインルーティン ー 禁酒</div>

    <div class="main-routine" id="mainRoutine" onclick="toggleMain()">
      <div class="main-routine-inner">
        <div class="toggle-btn"></div>
        <div class="routine-icon">🚫🍺</div>
        <div class="routine-info">
          <div class="routine-name">飲酒しない</div>
          <div class="routine-desc">今日もお酒を飲まずに過ごす</div>
        </div>
        <div class="routine-reward">+¥300</div>
      </div>
    </div>

    <div class="section-title">サブルーティン（各 +¥10）</div>

    <div class="sub-routines" id="subRoutines"></div>

    <div class="today-total">
      <div class="tt-label">本日の合計獲得</div>
      <div class="tt-val" id="todayTotalDisp">¥0</div>
    </div>

    <button class="complete-btn" onclick="saveToday()">✓ 今日の記録を保存</button>

    <div class="backup-row">
      <button class="backup-btn" onclick="exportData()">📤 データをバックアップ</button>
      <label class="backup-btn import-label">📥 データを復元<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    </div>
  </div>

  <!-- STATS -->
  <div class="view" id="view-stats">
    <div class="period-toggle">
      <button class="period-btn active" onclick="setPeriod('month', this)">今月</button>
      <button class="period-btn" onclick="setPeriod('3month', this)">3ヶ月</button>
      <button class="period-btn" onclick="setPeriod('6month', this)">6ヶ月</button>
      <button class="period-btn" onclick="setPeriod('all', this)">全期間</button>
    </div>

    <div class="stat-grid">
      <div class="stat-card gold">
        <div class="stat-label">貯金額</div>
        <div class="stat-val" id="statSavings">¥0</div>
        <div class="stat-unit">円</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">禁酒日数</div>
        <div class="stat-val" id="statNoDrink">0</div>
        <div class="stat-unit">日</div>
      </div>
      <div class="stat-card teal">
        <div class="stat-label">禁酒達成率</div>
        <div class="stat-val" id="statRate">0%</div>
        <div class="stat-unit">記録日比</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">月別 獲得金額</div>
      <div class="bar-chart" id="barChart"></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">体重推移</div>
      <div class="weight-chart-wrap">
        <svg class="weight-line-svg" id="weightSvg" viewBox="0 0 300 100" preserveAspectRatio="none"></svg>
      </div>
    </div>

    <div class="section-title">ルーティン達成数と獲得金額</div>
    <div class="routine-stats" id="routineStatsTable"></div>
  </div>

  <!-- HISTORY -->
  <div class="view" id="view-history">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="historyMonthLabel"></div>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUB_ROUTINES = [
  { id: 'running',   icon: '🏃', name: 'ランニング' },
  { id: 'video',     icon: '🎬', name: '動画投稿' },
  { id: 'stretch',   icon: '🤸', name: '柔軟体操' },
  { id: 'skincare',  icon: '🧴', name: '洗顔ケア' },
  { id: 'nasal',     icon: '💧', name: '鼻うがい' },
  { id: 'yogurt',    icon: '🥛', name: 'ヨーグルト摂取' },
  { id: 'squat',     icon: '🦵', name: '屈伸縄跳び' },
  { id: 'chikunain', icon: '👃', name: 'チクナイン' },
  { id: 'sunscreen', icon: '☀️', name: '日焼け止め' },
  { id: 'haircare',  icon: '💆', name: '髪ケア' },
  { id: 'kidtalk',   icon: '👨‍👧', name: '子供とお話' },
  { id: 'floss',     icon: '🦷', name: '歯のフロス' },
  { id: 'chores',    icon: '🧹', name: '家事' },
];

const REWARD_MAIN = 300;
const REWARD_SUB  = 10;

function loadData() {
  try { return JSON.parse(localStorage.getItem('routineData_v2') || '{}'); } catch { return {}; }
}
function saveData(d) { localStorage.setItem('routineData_v2', JSON.stringify(d)); }

function getTodayKey() { return dateToKey(new Date()); }
function dateToKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

let todayState = { noDrink: false, subs: {}, weight: null };
let statPeriod = 'month';
let historyMonth = new Date();

function init() {
  const now = new Date();
  document.getElementById('todayDisplay').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${['日','月','火','水','木','金','土'][now.getDay()]}）`;

  const data = loadData();
  const tk = getTodayKey();
  if (data[tk]) todayState = { noDrink: false, subs: {}, weight: null, ...data[tk] };

  renderSubRoutines();
  updateTodayUI();
  renderWeightPrev();
  renderStats();
  renderHistory();
}

// ---- TODAY ----

function renderSubRoutines() {
  document.getElementById('subRoutines').innerHTML = SUB_ROUTINES.map(r => `
    <div class="sub-card ${todayState.subs[r.id] ? 'done' : ''}" id="sub-${r.id}" onclick="toggleSub('${r.id}')">
      <div class="sub-icon">${r.icon}</div>
      <div class="sub-info">
        <div class="sub-name">${r.name}</div>
        <div class="sub-streak">${getSubStreak(r.id)}日連続</div>
      </div>
      <div class="sub-reward">+¥10</div>
      <div class="check-mark">✓</div>
    </div>
  `).join('');
}

function getSubStreak(id) {
  const data = loadData();
  let streak = 0;
  const d = new Date(); d.setDate(d.getDate() - 1);
  while (streak <= 365) {
    if (data[dateToKey(d)]?.subs?.[id]) { streak++; d.setDate(d.getDate()-1); } else break;
  }
  return streak;
}

function renderWeightPrev() {
  const data = loadData();
  const tk = getTodayKey();
  const keys = Object.keys(data).filter(k => k < tk && data[k].weight != null).sort();
  const prevKey = keys[keys.length - 1];

  document.getElementById('weightPrev').textContent = prevKey
    ? `前回: ${data[prevKey].weight}kg（${prevKey.replace(/-/g,'/')}）`
    : '前回: —';

  if (todayState.weight != null) {
    document.getElementById('weightInput').value = todayState.weight;
    updateWeightDiff(todayState.weight, prevKey ? data[prevKey].weight : null);
  }
}

function onWeightInput() {
  const val = parseFloat(document.getElementById('weightInput').value);
  if (!isNaN(val) && val > 0) {
    todayState.weight = Math.round(val * 10) / 10;
    const data = loadData();
    const tk = getTodayKey();
    const keys = Object.keys(data).filter(k => k < tk && data[k].weight != null).sort();
    const prevKey = keys[keys.length - 1];
    updateWeightDiff(todayState.weight, prevKey ? data[prevKey].weight : null);
  } else {
    todayState.weight = null;
    document.getElementById('weightDiff').textContent = '—';
    document.getElementById('weightDiff').className = 'weight-diff same';
  }
  autoSave();
}

function updateWeightDiff(curr, prev) {
  const el = document.getElementById('weightDiff');
  if (prev == null) { el.textContent = '—'; el.className = 'weight-diff same'; return; }
  const diff = Math.round((curr - prev) * 10) / 10;
  if (diff > 0) { el.textContent = `+${diff}`; el.className = 'weight-diff up'; }
  else if (diff < 0) { el.textContent = `${diff}`; el.className = 'weight-diff down'; }
  else { el.textContent = '±0'; el.className = 'weight-diff same'; }
}

function toggleMain() {
  todayState.noDrink = !todayState.noDrink;
  const el = document.getElementById('mainRoutine');
  el.classList.toggle('done', todayState.noDrink);
  if (todayState.noDrink) {
    el.classList.add('pulse');
    setTimeout(() => el.classList.remove('pulse'), 600);
    showToast('🎉 +¥300 禁酒達成！');
  }
  autoSave(); updateTodayUI();
}

function toggleSub(id) {
  todayState.subs[id] = !todayState.subs[id];
  document.getElementById(`sub-${id}`).classList.toggle('done', todayState.subs[id]);
  const r = SUB_ROUTINES.find(x => x.id === id);
  if (todayState.subs[id]) showToast(`${r.icon} ${r.name} +¥10！`);
  autoSave(); updateTodayTotal(); updateSavingsDisplay();
}

function calcEntryGain(val) {
  return (val.noDrink ? REWARD_MAIN : 0) +
    Object.values(val.subs || {}).filter(Boolean).length * REWARD_SUB;
}

function updateTodayTotal() {
  const g = calcEntryGain(todayState);
  document.getElementById('todayTotalDisp').textContent = `¥${g}`;
  document.getElementById('todayGain').textContent = `¥${g}`;
}

function autoSave() {
  const data = loadData();
  data[getTodayKey()] = todayState;
  saveData(data);
}

function saveToday() {
  autoSave(); updateTodayUI(); renderStats(); renderHistory();
  showToast('✅ 今日の記録を保存しました');
}

function updateTodayUI() {
  document.getElementById('mainRoutine').classList.toggle('done', todayState.noDrink);
  updateSavingsDisplay(); updateStreak(); updateTodayTotal();
}

function updateSavingsDisplay() {
  const data = loadData();
  const now = new Date();
  let total = 0, monthTotal = 0, weekTotal = 0;
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);

  for (const [key, val] of Object.entries(data)) {
    const g = calcEntryGain(val);
    const d = new Date(key);
    total += g;
    if (d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth()) monthTotal += g;
    if (d >= weekAgo) weekTotal += g;
  }

  const el = document.getElementById('totalSavings');
  el.innerHTML = `¥${total.toLocaleString()}<span>円</span>`;
  el.classList.add('count-anim');
  setTimeout(() => el.classList.remove('count-anim'), 350);

  document.getElementById('monthSavings').textContent = `¥${monthTotal.toLocaleString()}`;
  document.getElementById('weekSavings').textContent = `¥${weekTotal.toLocaleString()}`;
}

function updateStreak() {
  const data = loadData();
  let streak = 0;
  const d = new Date();
  while (streak <= 365) {
    if (data[dateToKey(d)]?.noDrink) { streak++; d.setDate(d.getDate()-1); } else break;
  }
  document.getElementById('streakCount').textContent = streak;
}

// ---- STATS ----

function setPeriod(p, btn) {
  statPeriod = p;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStats();
}

function getFilteredEntries(period) {
  const data = loadData();
  const now = new Date();
  return Object.entries(data).filter(([key]) => {
    const d = new Date(key);
    if (period === 'month') return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    if (period === '3month') { const t = new Date(now); t.setMonth(t.getMonth()-3); return d >= t; }
    if (period === '6month') { const t = new Date(now); t.setMonth(t.getMonth()-6); return d >= t; }
    return true;
  });
}

function renderStats() {
  const entries = getFilteredEntries(statPeriod);
  const noDrinkDays = entries.filter(([,v]) => v.noDrink).length;
  const totalGain = entries.reduce((s,[,v]) => s + calcEntryGain(v), 0);
  const rate = entries.length > 0 ? Math.round(noDrinkDays / entries.length * 100) : 0;

  document.getElementById('statSavings').textContent = `¥${totalGain.toLocaleString()}`;
  document.getElementById('statNoDrink').textContent = noDrinkDays;
  document.getElementById('statRate').textContent = `${rate}%`;

  renderBarChart(); renderWeightChart(); renderRoutineStatsTable();
}

function renderBarChart() {
  const data = loadData();
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth(), label: `${d.getMonth()+1}月` });
  }

  const gains = months.map(m =>
    Object.entries(data)
      .filter(([k]) => { const d = new Date(k); return d.getFullYear() === m.year && d.getMonth() === m.month; })
      .reduce((s,[,v]) => s + calcEntryGain(v), 0)
  );

  const maxG = Math.max(...gains, 1);

  document.getElementById('barChart').innerHTML = months.map((m, i) => {
    const h = Math.round(gains[i] / maxG * 82);
    return `<div class="bar-wrap">
      <div class="bar ${gains[i] === 0 ? 'low' : ''}" style="height:${Math.max(h,2)}px"></div>
      <div class="bar-label">${m.label}</div>
    </div>`;
  }).join('');
}

function renderWeightChart() {
  const data = loadData();
  const entries = Object.entries(data)
    .filter(([,v]) => v.weight != null)
    .sort(([a],[b]) => a.localeCompare(b))
    .slice(-30);

  const svg = document.getElementById('weightSvg');

  if (entries.length < 2) {
    svg.innerHTML = `<text x="150" y="55" text-anchor="middle" fill="#4a4f5e" font-size="11" font-family="sans-serif">データが2件以上になると表示されます</text>`;
    return;
  }

  const weights = entries.map(([,v]) => v.weight);
  const minW = Math.min(...weights) - 0.5;
  const maxW = Math.max(...weights) + 0.5;
  const range = maxW - minW || 1;

  const pts = entries.map(([,v], i) => {
    const x = 10 + (i / (entries.length - 1)) * 280;
    const y = 90 - ((v.weight - minW) / range) * 78;
    return { x, y, w: v.weight };
  });

  const polyline = pts.map(p => `${p.x},${p.y}`).join(' ');
  const dots = pts.map(p =>
    `<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="#4ecdc4" opacity="0.85"/>`
  ).join('');

  svg.innerHTML = `
    <polyline points="${polyline}" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.55"/>
    ${dots}
    <text x="10" y="10" fill="#4a4f5e" font-size="8" font-family="sans-serif">${maxW.toFixed(1)}kg</text>
    <text x="10" y="98" fill="#4a4f5e" font-size="8" font-family="sans-serif">${minW.toFixed(1)}kg</text>
    <text x="285" y="10" fill="#4a4f5e" font-size="8" font-family="sans-serif" text-anchor="end">${pts[pts.length-1].w}kg</text>
  `;
}

function renderRoutineStatsTable() {
  const entries = getFilteredEntries(statPeriod);
  const total = entries.length || 1;

  const allItems = [
    { icon: '🚫🍺', name: '飲酒しない', reward: REWARD_MAIN,
      count: entries.filter(([,v]) => v.noDrink).length },
    ...SUB_ROUTINES.map(r => ({
      icon: r.icon, name: r.name, reward: REWARD_SUB,
      count: entries.filter(([,v]) => v.subs?.[r.id]).length
    }))
  ];

  document.getElementById('routineStatsTable').innerHTML = allItems.map(item => `
    <div class="routine-stat-row">
      <div class="rs-icon">${item.icon}</div>
      <div class="rs-name">${item.name}</div>
      <div class="rs-earn">¥${(item.count * item.reward).toLocaleString()}</div>
      <div class="rs-count">${item.count}日</div>
      <div class="rs-bar-wrap"><div class="rs-bar" style="width:${Math.round(item.count/total*100)}%"></div></div>
    </div>
  `).join('');
}

// ---- HISTORY ----

function changeMonth(delta) {
  historyMonth = new Date(historyMonth.getFullYear(), historyMonth.getMonth() + delta, 1);
  renderHistory();
}

function renderHistory() {
  const data = loadData();
  const y = historyMonth.getFullYear();
  const m = historyMonth.getMonth();
  document.getElementById('historyMonthLabel').textContent = `${y}年${m+1}月`;

  const daysInMonth = new Date(y, m+1, 0).getDate();
  const items = [];

  for (let d = daysInMonth; d >= 1; d--) {
    const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry = data[key];
    const wd = ['日','月','火','水','木','金','土'][new Date(y, m, d).getDay()];

    const iconsHtml = [
      { icon: '🚫🍺', done: entry?.noDrink },
      ...SUB_ROUTINES.map(r => ({ icon: r.icon, done: entry?.subs?.[r.id] }))
    ].map(x => `<span class="h-icon ${x.done ? 'done' : ''}">${x.icon}</span>`).join('');

    const gain = entry ? calcEntryGain(entry) : 0;
    const wt = entry?.weight != null ? `${entry.weight}kg` : '';

    items.push(`
      <div class="history-item">
        <div class="history-date">${m+1}/${d}（${wd}）</div>
        <div class="history-icons">${iconsHtml}</div>
        ${wt ? `<div class="history-weight">${wt}</div>` : ''}
        ${gain > 0 ? `<div class="history-gain">+¥${gain}</div>` : ''}
        <div><div class="${entry?.noDrink ? 'dot-no-drink' : 'dot-drink'}"></div></div>
      </div>
    `);
  }

  document.getElementById('historyList').innerHTML = items.join('') ||
    '<div class="empty-state">記録がありません</div>';
}

// ---- VIEW SWITCH ----

function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  btn.classList.add('active');
  if (name === 'stats') renderStats();
  if (name === 'history') renderHistory();
}

// ---- TOAST ----

// ===== BACKUP / RESTORE =====
function exportData() {
  const data = loadData();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = getTodayKey();
  a.href = url;
  a.download = 'routine-backup-' + today + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 バックアップを保存しました');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      // 既存データとマージ（新しいデータが優先）
      const existing = loadData();
      const merged = Object.assign({}, existing, imported);
      saveData(merged);
      // 今日のデータを再ロード
      const tk = getTodayKey();
      if (merged[tk]) {
        todayState = { noDrink: false, subs: {}, weight: null, ...merged[tk] };
      }
      renderSubRoutines();
      updateTodayUI();
      renderWeightPrev();
      renderStats();
      renderHistory();
      showToast('📥 ' + Object.keys(imported).length + '日分のデータを復元しました');
    } catch(err) {
      showToast('❌ ファイルの読み込みに失敗しました');
    }
    // ファイル入力をリセット（同じファイルを再度選べるよう）
    event.target.value = '';
  };
  reader.readAsText(file);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
